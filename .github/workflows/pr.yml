name: PR

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the shared package first — both apps' type-checks resolve its dist .d.ts.
      - run: pnpm build:shared
      - run: pnpm lint
      # `build` type-checks (tsc/nest build) and bundles both apps.
      - run: pnpm --filter @laundry/api build
      - run: pnpm --filter @laundry/dashboard build
