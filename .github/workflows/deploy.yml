name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names. Change the namespace to your GHCR owner.
  API_IMAGE: ghcr.io/yassineelouafi/laundry-api
  DASHBOARD_IMAGE: ghcr.io/yassineelouafi/laundry-dashboard

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          # Vite inlines VITE_API_URL at build time — set it in repo Variables.
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploys
        run: |
          for app_id in "${{ secrets.DOKPLOY_API_APP_ID }}" "${{ secrets.DOKPLOY_DASHBOARD_APP_ID }}"; do
            curl -sf -X POST "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
              -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -d "{\"applicationId\": \"$app_id\"}"
          done
